<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create or Join Meeting</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Lato:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="public/Assets/css/style.css">
</head>

<body style="padding-top: 3.5rem;">
    <nav class="navbar navbar-expand-md fixed-top">
        <!-- Left Section: Logo and Brand -->
        <div class="navbar-left d-flex align-items-center">
            <img src="public/Assets/images/google-meet-icon.png" class="logo" alt="Virtual Meet Logo">
            <a href="#" class="navbar-brand text-dark">Virtual Meet</a>
        </div>
        <!-- Right Section: Navigation Links and Buttons -->
        <div class="twodivs navbar-right d-flex flex-column">
            <!-- Navigation Links -->
            <ul class="navbar-nav nav-links">
                <li class="nav-item">
                    <a href="#" class="nav-link">At a glance</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">How it Works</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Plan and Price</a>
                </li>
            </ul>
            <!-- Buttons -->
            <ul class="navbar-nav nav-buttons mt-2">
                <li class="nav-item">
                    <a href="#" class="nav-link">Sign in</a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-outline-secondary btn-lg text-info font-weight-bold join-meeting">Join the Meeting</button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-lg btn-info text-light font-weight-bold new-meeting">Start a Meeting</button>
                </li>
            </ul>
        </div>
    </nav>
    
    <main>
        <div class="jumbotron h-100 d-flex align-items-center">
            <!-- Left Content -->
            <div class="container w-50 text-content">
                <h1 style="font-size: 3rem;"> Premium Video Meeting. Now it is available for free to everyone </h1>
                <p style="font-size: 20px;">
                    We're redesigning the google meet service for secure business meetings and making it free for everyone to use.
                </p>
                <ul class="display-center justify-content-start">
                    <li style="padding: 0;">
                        <button class="btn btn-lg text-light font-weight-bold display-center new-meeting" style="background-color: #01796b;">
                            <span class="material-icons mr-2">video_call</span>New Meeting
                        </button>
                    </li>
                    <li class="pl-3">
                        <button class="btn btn-lg btn-outline-secondary text-dark font-weight-bold display-center" style="background-color: #ffffff;">
                            <span class="material-icons mr-2">keyboard</span>
                            <input type="text" placeholder="Enter a code" style="border: none;" class="enter-code">
                        </button>
                    </li>
                    <li class="text-dark pl-2 font-weight-bold cursor-pointer join-action">Join</li>
                </ul>
            </div>
            <!-- Right Image -->
            <div class="container w-50 image-container">
                <img src="public/Assets/images/signin-image.webp" alt="sign in image" class="signin-image">
            </div>
        </div>        
    </main>

    <footer class="container text-center">
        <h6>Learn more about <span class="learn-more text-info">Virtual Meet</span>. </h6>
    </footer>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function(){
            $(document).on("click", ".join-meeting", function(){
                $(".enter-code").focus();
            })
            $(document).on("click", ".join-action", function(){
                var join_value = $(".enter-code").val();
                var meetingUrl = window.location.origin + "?meetingID="+join_value;
                window.location.replace(meetingUrl);
            })
            $(document).on("click", ".new-meeting", function(){
                var eight_d_value = Math.floor(Math.random()*100000000);
                var meetingUrl = window.location.origin + "?meetingID="+eight_d_value;
                window.location.replace(meetingUrl);
            })
        })
    </script>
</body>
</html>
